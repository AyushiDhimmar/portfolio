<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayushi Dhimmar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255, 255, 255, 0.07);
      --text: #e2e8f0;
      --muted: #64748b;
      --da: #0ea5e9;
      --da-glow: rgba(14, 165, 233, 0.15);
      --ml: #7c3aed;
      --ml-glow: rgba(124, 58, 237, 0.15);
    }

    html,
    body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .split {
      display: flex;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 48px 40px;
      position: relative;
      cursor: pointer;
      transition: flex 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      color: inherit;
      overflow: hidden;
    }

    /* Divider line */
    .split::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 10%;
      height: 80%;
      width: 1px;
      background: var(--border);
      z-index: 2;
      pointer-events: none;
    }

    /* Glow background per panel */
    .panel--da::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: var(--da-glow);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(80px);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .panel--ml::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: var(--ml-glow);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(80px);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .panel--da:hover::before,
    .panel--ml:hover::before {
      opacity: 1;
    }

    /* ── Name at top center ── */
    .name-bar {
      position: absolute;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      text-align: center;
    }

    .name-bar h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Panel content ── */
    .panel-icon {
      font-size: 2.8rem;
      line-height: 1;
      filter: grayscale(1) brightness(0.6);
      transition: filter 0.4s ease, transform 0.4s ease;
    }

    .panel:hover .panel-icon {
      filter: grayscale(0) brightness(1);
      transform: scale(1.1);
    }

    .panel-role {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 400;
      line-height: 1.2;
      text-align: center;
      color: #94a3b8;
      transition: color 0.4s ease;
    }

    .panel--da:hover .panel-role {
      color: var(--da);
    }

    .panel--ml:hover .panel-role {
      color: var(--ml);
    }

    .panel-desc {
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
      max-width: 240px;
      line-height: 1.7;
      transition: color 0.4s ease;
    }

    .panel:hover .panel-desc {
      color: #94a3b8;
    }

    .panel-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 22px;
      border-radius: 8px;
      border: 1px solid transparent;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease, background 0.3s ease;
    }

    .panel:hover .panel-cta {
      opacity: 1;
      transform: translateY(0);
    }

    .panel--da .panel-cta {
      color: var(--da);
      border-color: rgba(14, 165, 233, 0.3);
      background: rgba(14, 165, 233, 0.08);
    }

    .panel--ml .panel-cta {
      color: var(--ml);
      border-color: rgba(124, 58, 237, 0.3);
      background: rgba(124, 58, 237, 0.08);
    }

    /* ── Bottom hint ── */
    .hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      z-index: 3;
      white-space: nowrap;
      animation: fadeup 1.2s ease 0.8s both;
    }

    @keyframes fadeup {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {

      html,
      body {
        overflow: auto;
      }

      .split {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      .split::after {
        top: 50%;
        left: 10%;
        width: 80%;
        height: 1px;
      }

      .panel {
        min-height: 50vh;
        padding: 60px 32px;
      }

      .panel-cta {
        opacity: 1;
        transform: translateY(0);
      }

      .name-bar {
        top: 20px;
      }

      .name-bar h1 {
        font-size: 0.85rem;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Name at top -->
  <div class="name-bar">
    <h1>Ayushi Dhimmar</h1>
  </div>

  <div class="split">

    <!-- DA Panel -->
    <a href="da.html" class="panel panel--da">
      <div class="panel-icon">📊</div>
      <h2 class="panel-role">Data Analyst</h2>
      <p class="panel-desc">SQL · Tableau · Power BI · Python · EDA · Dashboards</p>
      <span class="panel-cta">
        View Portfolio
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </span>
    </a>

    <!-- ML Panel -->
    <a href="ml.html" class="panel panel--ml">
      <div class="panel-icon">🤖</div>
      <h2 class="panel-role">ML Engineer</h2>
      <p class="panel-desc">Python · Scikit-learn · Regression · Clustering · Model Evaluation</p>
      <span class="panel-cta">
        View Portfolio
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </span>
    </a>

  </div>

  <p class="hint">Choose your path</p>

</body>

</html>
